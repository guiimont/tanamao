<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Tá na Mão! - Operacional & Gestão</title>

<style>
:root{
  --verde:#3C6E47;
  --verde-escuro:#2d5235;
  --dourado:#C9A86A;
  --fundo:#f4f6f4;
  --borda:#ddd;
  --muted:#666;
  --sombra: 0 4px 12px rgba(0,0,0,0.08);
}

body{font-family:'Arial', sans-serif; background:var(--fundo); margin:0; color:#333;}

header { background:var(--verde); color:#fff; padding:16px; text-align:center; }

.wrap { padding: 16px; max-width: 1200px; margin: 0 auto; }

/* MENU DE ABAS */
.tabs { display: flex; gap: 10px; margin-bottom: 24px; border-bottom: 2px solid var(--borda); padding-bottom: 10px; justify-content: center; }
.tab-btn { background: transparent; border: none; font-size: 1rem; font-weight: 600; color: var(--muted); cursor: pointer; padding: 10px 20px; border-radius: 8px; transition: 0.2s; }
.tab-btn:hover { background: rgba(60,110,71,0.05); }
.tab-btn.active { background: var(--verde); color: #fff; }

/* Lógica de exibição das abas */
.tab-content { display: none; }
.tab-content.active { display: block !important; }

/* CARDS ADMIN */
.admin-card { background: #fff; border: 1px solid var(--borda); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: var(--sombra); }
.admin-card h3 { color: var(--verde-escuro); margin-top: 0; margin-bottom: 16px; font-size: 1.2rem; border-bottom: 1px solid #eee; padding-bottom: 8px; }
.admin-card input, .admin-card select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
.admin-card button { background: var(--dourado); color: var(--verde-escuro); border: none; padding: 12px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; }
.admin-card button:hover { background: #b8965a; }

/* KANBAN OPERACIONAL */
.board{ display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }
.column{ background:#fff; border-radius:12px; padding:10px; min-height:400px; border: 1px solid #eee; }
.column-header{ font-weight:bold; margin-bottom:10px; color:var(--verde); text-align: center; border-bottom: 2px solid var(--fundo); padding-bottom: 5px; }
.card{ background:#f9f9f9; padding:12px; border-radius:8px; margin-bottom:8px; font-size:14px; border-left: 4px solid var(--dourado); }
.card button{ margin-top:8px; width:100%; background: var(--verde); color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; }

.topbar-btns { display: flex; gap: 10px; margin-bottom: 15px; justify-content: flex-end; }

/* Esconder botões/abas de admin por padrão */
[data-role="admin"] { display: none; }
</style>
</head>

<body>

<header>
  <h2>Painel Operacional & Gestão</h2>
</header>

<div class="wrap">
  <!-- Menu de Abas -->
  <div class="tabs">
    <button class="tab-btn active" onclick="abrirAba('aba-vendas', this)">📦 Vendas (Operação)</button>
    <button class="tab-btn" data-role="admin" onclick="abrirAba('aba-compras', this)">🛒 Compras & Estoque</button>
    <button class="tab-btn" data-role="admin" onclick="abrirAba('aba-config', this)">📊 Financeiro & Dash</button>
    <button class="tab-btn" id="btn-login-admin" onclick="loginAdmin()" style="background: #eee;">Admin 🔒</button>
  </div>

  <!-- ABA 1: VENDAS (KANBAN) -->
  <div id="aba-vendas" class="tab-content active">
    <div class="topbar-btns">
        <button class="tab-btn" style="background: var(--dourado); color: white;" onclick="carregarPedidos()">🔄 Atualizar</button>
        <button class="tab-btn" data-role="admin" style="background: #444; color: white;" onclick="editarLimite()">Definir Limite</button>
    </div>
    <div class="board">
        <div class="column"><div class="column-header">Entrou</div><div id="col-paid"></div></div>
        <div class="column"><div class="column-header">Produção</div><div id="col-preparing"></div></div>
        <div class="column"><div class="column-header">Pronto</div><div id="col-ready"></div></div>
        <div class="column"><div class="column-header">Entrega</div><div id="col-delivery"></div></div>
    </div>
  </div>

  <!-- ABA 2: COMPRAS E ESTOQUE (ADMIN) -->
  <div id="aba-compras" class="tab-content">
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
        <div class="admin-card">
          <h3>Cadastrar Fornecedor</h3>
          <input id="f-nome" placeholder="Nome do Fornecedor / Empresa">
          <input id="f-contato" placeholder="Contato (WhatsApp / Email)">
          <input id="f-doc" placeholder="CNPJ / CPF">
          <button onclick="salvarFornecedor()">Salvar Fornecedor</button>
        </div>

        <div class="admin-card">
          <h3>Lançar Compra / Entrada</h3>
          <select id="e-fornecedor"><option value="">Selecione o Fornecedor...</option></select>
          <input id="e-item" placeholder="Item (Ex: Embalagens, Frango)">
          <input id="e-qtd" type="number" placeholder="Quantidade">
          <input id="e-valor" type="number" placeholder="Valor Total (R$)">
          <select id="e-cat">
            <option value="Insumos">Insumos / Ingredientes</option>
            <option value="Embalagens">Embalagens</option>
            <option value="Outros">Outros</option>
          </select>
          <button onclick="salvarCompra()">Registrar Compra</button>
        </div>
    </div>
  </div>

  <!-- ABA 3: FINANCEIRO (ADMIN) -->
  <div id="aba-config" class="tab-content">
    <div class="admin-card" style="max-width: 500px; margin: 0 auto;">
      <h3>Dashboard de Resultado Real</h3>
      <p>Faturamento Bruto: <strong id="dash-bruto">R$ 0,00</strong></p>
      <p>Taxas de Gateway: <strong id="dash-taxas" style="color: #c0392b;">R$ 0,00</strong></p>
      <p>Custos Fixos: <strong id="dash-custos" style="color: #c0392b;">R$ 0,00</strong></p>
      <p>Compras/Estoque: <strong id="dash-compras" style="color: #c0392b;">R$ 0,00</strong></p>
      <hr>
      <h4>Lucro Líquido: <strong id="dash-lucro" style="color: var(--verde); font-size: 1.5rem;">R$ 0,00</strong></h4>
      <button onclick="atualizarDashboardFinanceiro()" style="margin-top: 15px;">Atualizar Dados</button>
    </div>
  </div>
</div>

<script>
const BACKEND_URL = "https://onrender.com";
const API = BACKEND_URL + "/api";
let pedidos = [];

const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

// ================= ACESSO & ABAS =================
let USER_ROLE = localStorage.getItem("tnm_role") || "operador";

function loginAdmin() {
  const senha = prompt("Senha admin:");
  if (senha === "123456") {
    USER_ROLE = "admin";
    localStorage.setItem("tnm_role", "admin");
    aplicarPermissoes();
    alert("Bem-vindo, Admin!");
  } else { alert("Senha incorreta"); }
}

function aplicarPermissoes() {
  document.querySelectorAll("[data-role='admin']").forEach(el => {
    el.style.display = (USER_ROLE === "admin") ? "inline-block" : "none";
  });
  if(USER_ROLE === "admin") {
      document.getElementById("btn-login-admin").innerText = "Admin ✅";
      document.getElementById("btn-login-admin").style.background = "var(--dourado)";
  }
}

function abrirAba(idAba, btn) {
  // 1. Remove 'active' de todos os conteúdos e botões
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

  // 2. Adiciona 'active' apenas na aba e botão clicado
  document.getElementById(idAba).classList.add('active');
  btn.classList.add('active');

  // 3. Gatilhos específicos
  if(idAba === 'aba-compras') carregarFornecedores();
  if(idAba === 'aba-config') atualizarDashboardFinanceiro();
}

// ================= PEDIDOS (KANBAN) =================
async function carregarPedidos(){
  try {
    const res = await fetch(API + "/operations/orders");
    const data = await res.json();
    pedidos = data.orders || [];
    renderizar();
  } catch (e) { console.error("Erro ao carregar pedidos:", e); }
}

function renderizar(){
  const filter = (status) => pedidos.filter(p => p.delivery_status === status || (status === 'pending' && !p.delivery_status && p.payment_status === 'approved'));
  renderCol("col-paid", filter('pending'));
  renderCol("col-preparing", filter('preparing'));
  renderCol("col-ready", filter('ready'));
  renderCol("col-delivery", filter('out_for_delivery'));
}

function renderCol(id, lista){
  const el = document.getElementById(id);
  el.innerHTML = lista.length ? "" : "<div class='card'>Vazio</div>";
  lista.forEach(p => {
    el.innerHTML += `<div class="card">
      <strong>${p.customer_name}</strong><br>Total: ${fmt(p.total)}<br>
      <button onclick="atualizarStatus('${p.id}', '${proximoStatus(p.delivery_status)}')">
        ${labelBotao(p.delivery_status)}
      </button>
    </div>`;
  });
}

function proximoStatus(s){
  if(!s || s==='pending') return 'preparing';
  if(s==='preparing') return 'ready';
  if(s==='ready') return 'out_for_delivery';
  return 'delivered';
}

function labelBotao(s){
  if(!s || s==='pending') return 'Iniciar Produção';
  if(s==='preparing') return 'Marcar como Pronto';
  if(s==='ready') return 'Saiu para Entrega';
  return 'Finalizar Pedido';
}

async function atualizarStatus(id, status){
  await fetch(`${API}/operations/orders/${id}/status`, {
    method: "PATCH", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ delivery_status: status })
  });
  carregarPedidos();
}

// ================= GESTÃO DE COMPRAS & FORNECEDORES =================
async function carregarFornecedores() {
  const res = await fetch(API + "/suppliers");
  const data = await res.json();
  const select = document.getElementById("e-fornecedor");
  select.innerHTML = '<option value="">Selecione o Fornecedor...</option>';
  if(data.data) data.data.forEach(f => select.innerHTML += `<option value="${f.id}">${f.name}</option>`);
}

async function salvarFornecedor() {
  const name = document.getElementById("f-nome").value;
  const contact = document.getElementById("f-contato").value;
  if(!name) return alert("Nome obrigatório");
  await fetch(API + "/suppliers", {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, contact })
  });
  alert("Fornecedor cadastrado!");
  carregarFornecedores();
}

async function salvarCompra() {
  const body = {
    supplier_id: document.getElementById("e-fornecedor").value,
    item_name: document.getElementById("e-item").value,
    quantity: document.getElementById("e-qtd").value,
    total_value: document.getElementById("e-valor").value,
    category: document.getElementById("e-cat").value
  };
  if(!body.item_name || !body.total_value) return alert("Preencha os campos!");
  await fetch(API + "/stock", {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body)
  });
  alert("Compra registrada!");
}

// ================= DASHBOARD FINANCEIRO =================
async function atualizarDashboardFinanceiro() {
  const resOrders = await fetch(API + "/operations/orders");
  const dataOrders = await resOrders.json();
  let bruto = 0, taxas = 0;
  (dataOrders.orders || []).forEach(p => {
    if (p.payment_status === "approved") {
      bruto += Number(p.total || 0);
      taxas += Number(p.gateway_fee || 0);
    }
  });

  const resCosts = await fetch(API + "/costs");
  const dataCosts = await resCosts.json();
  const custosFixos = (dataCosts.data || []).reduce((acc, c) => acc + Number(c.value), 0);

  const resStock = await fetch(API + "/stock");
  const dataStock = await resStock.json();
  const compras = (dataStock.data || []).reduce((acc, c) => acc + Number(c.total_value), 0);

  const lucro = bruto - taxas - custosFixos - compras;

  document.getElementById("dash-bruto").innerText = fmt(bruto);
  document.getElementById("dash-taxas").innerText = fmt(taxas);
  document.getElementById("dash-custos").innerText = fmt(custosFixos);
  document.getElementById("dash-compras").innerText = fmt(compras);
  document.getElementById("dash-lucro").innerText = fmt(lucro);
}

// INICIALIZAÇÃO
aplicarPermissoes();
carregarPedidos();
setInterval(carregarPedidos, 30000);
</script>

</body>
</html>
