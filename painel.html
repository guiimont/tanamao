<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Cardápio</title>

<style>
body{font-family:Arial;background:#f4f6f4;margin:0}

header{
  background:#3C6E47;
  color:#fff;
  padding:16px;
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.btn-new{
  background:#C9A86A;
  margin-bottom:16px;
}

/* FORM */
.form-card{
  background:#fff;
  padding:20px;
  border-radius:14px;
  border:1px solid #ddd;
  margin-bottom:20px;
  display:none;
}

.field{margin-bottom:12px;}

input, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.btn-save{background:#3C6E47;color:#fff;width:100%;}
.btn-delete{background:#b93b3b;color:#fff;margin-top:6px;}

.card{
  background:#fff;
  padding:14px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:12px;
}
</style>
</head>

<body>

<header>
<h2>Gestão de Cardápio</h2>
</header>

<div class="container">

<button class="btn-new" onclick="toggleForm()">+ Novo Produto</button>

<div id="form-box" class="form-card">

  <div class="field">
    <input id="novo-nome" placeholder="Nome do produto">
  </div>

  <div class="field">
    <textarea id="novo-desc" placeholder="Descrição"></textarea>
  </div>

  <div class="field">
    <input id="novo-preco" placeholder="Preço">
  </div>

  <div class="field">
    <input type="file" id="novo-img" accept="image/png, image/jpeg">
  </div>

  <button class="btn-save" onclick="criarProduto()">Salvar</button>
</div>

<div id="lista"></div>

</div>

<script>

const API = "https://tanamao-backend.onrender.com/api";

// ================= UI =================
function toggleForm(){
  const el = document.getElementById("form-box");
  el.style.display = el.style.display === "none" ? "block" : "none";
}

// ================= FILE =================
function toBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
  });
}

// ================= LOAD =================
async function carregar(){
  const res = await fetch(API + "/products");
  const data = await res.json();

  const el = document.getElementById("lista");
  el.innerHTML = "";

  (data.products || []).forEach(p=>{
    el.innerHTML += `
      <div class="card">
        <input value="${p.name}" id="name-${p.id}">
        <textarea id="desc-${p.id}">${p.description||""}</textarea>
        <input value="${p.price}" id="price-${p.id}">
        ${p.image_url ? `<img src="${p.image_url}" style="width:100px;border-radius:8px;margin-bottom:8px;">` : ""}

        <input value="${p.image_url||""}" id="img-${p.id}">

        <button class="btn-save" onclick="salvar('${p.id}')">Salvar</button>
        <button class="btn-delete" onclick="deletar('${p.id}')">Excluir</button>
      </div>
    `;
  });
}

// ================= CREATE =================
async function criarProduto(){
  const name = document.getElementById("novo-nome").value;
  const description = document.getElementById("novo-desc").value;
  const price = document.getElementById("novo-preco").value;
  const file = document.getElementById("novo-img-file").files[0];

  if (!name) {
    alert("Nome obrigatório");
    return;
  }

  let image_url = "";

  if (file) {
    image_url = await new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
    });
  }

  console.log("Imagem enviada:", image_url); // 👈 DEBUG

  const res = await fetch("https://tanamao-backend.onrender.com/api/products",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      name,
      description,
      price:Number(price)||0,
      image_url
    })
  });

  const data = await res.json();

  console.log("Resposta backend:", data); // 👈 DEBUG

  if (!data.ok) {
    alert("Erro ao salvar");
    return;
  }

  carregarProdutos();
}

// ================= UPDATE =================
async function salvar(id){
  const name = document.getElementById("name-"+id).value;
  const description = document.getElementById("desc-"+id).value;
  const price = document.getElementById("price-"+id).value;
  const image_url = document.getElementById("img-"+id).value;

  await fetch(API+"/products/"+id,{
    method:"PUT",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ name, description, price, image_url })
  });

  alert("Salvo!");
}

// ================= DELETE =================
async function deletar(id){
  if(!confirm("Excluir?")) return;

  await fetch(API+"/products/"+id,{method:"DELETE"});
  carregar();
}

carregar();

</script>

</body>
</html>
