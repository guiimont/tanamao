<<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Painel Operacional - Tá na Mão!</title>

<style>
:root {
  --verde:#3C6E47; --verde-escuro:#2D5235; --dourado:#C9A86A;
  --fundo:#f4f6f4; --texto:#1a1a1a; --borda:#e6e6e6;
  --vermelho:#b93b3b; --amarelo:#d4a700; --azul:#2b6cb0; --cinza:#666;
}
body{font-family:Arial;background:var(--fundo);margin:0}
header{background:var(--verde);color:#fff;padding:20px;text-align:center;border-bottom:4px solid var(--dourado)}
.board{max-width:1400px;margin:20px auto;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:0 16px}
.column {
  background:#fff;
  border-radius:16px;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.column-header {
  text-align:center;
  font-weight:800;
  padding:10px;
  border-bottom:1px solid #eee;
  margin-bottom:10px;
}

.card{border:1px solid var(--borda);border-radius:10px;padding:10px;margin-bottom:10px}
.btn{padding:10px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.btn-primary{background:var(--verde);color:#fff}
.btn-secondary{background:var(--dourado)}
.btn-tertiary{background:var(--azul);color:#fff}
.topbar{display:flex;gap:10px;justify-content:center;margin:10px}
</style>
</head>

<body>

<header>
<header style="display:flex;align-items:center;justify-content:center;gap:12px;">
  <img src="TanaMao_Logopng" alt="Logo" style="height:40px;">
  <h2 style="margin:0;">Painel Operacional</h2>
</header>

</header>

<div class="topbar">
<button class="btn" onclick="carregarPedidos()">Atualizar</button>
<button class="btn" onclick="editarLimite()">Definir limite</button>
</div>

<div class="board">
<div class="column">
  <div class="column-header">Entrou</div>
  <div id="col-paid"></div>
</div>

<div class="column">
  <div class="column-header">Produção</div>
  <div id="col-preparing"></div>
</div>

<div class="column">
  <div class="column-header">Pronto</div>
  <div id="col-ready"></div>
</div>

<div class="column">
  <div class="column-header">Entrega</div>
  <div id="col-delivery"></div>
</div>

</div>

<script>

const API = "https://tanamao-backend.onrender.com/api/operations";
let pedidos = [];
let alertaMostrado = false;
let LIMITE = 100;

// ================= LOAD =================
async function carregarPedidos(){
  const res = await fetch(API + "/orders");
  const data = await res.json();
  pedidos = data.orders || [];
  renderizar();
  checarLimite();
}

// ================= LIMITE =================
function checarLimite(){
  const hoje = new Date().toISOString().slice(0,10);

  const count = pedidos.filter(p =>
    p.payment_status === "approved" &&
    p.created_at.startsWith(hoje)
  ).length;

  if(count >= LIMITE && !alertaMostrado){
    alertaMostrado = true;
    mostrarAlertaLimite();
  }
}

function mostrarAlertaLimite(){
  const continuar = confirm("Limite atingido. Continuar vendas?");
  if(!continuar) fecharPedidos();
}

async function fecharPedidos(){
  await fetch(API + "/settings/orders",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({value:"false"})
  });
  alert("Pedidos fechados");
}

function editarLimite(){
  const novo = prompt("Novo limite:", LIMITE);
  if(novo) LIMITE = Number(novo);
}

// ================= UTILS =================
function tempoDecorrido(data){
  const min = Math.floor((Date.now()-new Date(data))/60000);
  return min<60 ? min+" min" : Math.floor(min/60)+"h";
}

function corTempo(data){
  const min = Math.floor((Date.now()-new Date(data))/60000);
  if(min>60) return "color:red;font-weight:bold";
  if(min>30) return "color:orange";
  return "";
}

function abrirWhats(p){
  const num = (p.customer_phone||"").replace(/\D/g,"");
  window.open(`https://wa.me/55${num}?text=Pedido em andamento`);
}

// ================= OBS =================
function editarObs(id, atual){
  const nova = prompt("Obs:", atual||"");
  if(nova===null) return;

  fetch(API+"/orders/"+id+"/status",{
    method:"PATCH",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({obs:nova})
  }).then(()=>carregarPedidos());
}

// ================= STATUS =================
function atualizar(id,status){
  fetch(API+"/orders/"+id+"/status",{
    method:"PATCH",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({delivery_status:status})
  }).then(()=>carregarPedidos());
}

// ================= CARD =================
function card(p){
  const div=document.createElement("div");
  div.className="card";

  let btn="";

  if(p.delivery_status==="pending")
    btn=`<button class="btn btn-primary" onclick="atualizar('${p.id}','preparing')">Produção</button>`;
  else if(p.delivery_status==="preparing")
    btn=`<button class="btn btn-secondary" onclick="atualizar('${p.id}','ready')">Pronto</button>`;
  else if(p.delivery_status==="ready")
    btn=`<button class="btn btn-tertiary" onclick="atualizar('${p.id}','out_for_delivery')">Entrega</button>`;
  else if(p.delivery_status==="out_for_delivery")
    btn=`<button class="btn btn-primary" onclick="atualizar('${p.id}','delivered')">Finalizar</button>
         <button class="btn" onclick='abrirWhats(${JSON.stringify(p)})'>WhatsApp</button>`;

  div.innerHTML=`
    <b>${p.customer_name}</b><br>
    <small>${p.external_reference}</small><br>
    <div style="${corTempo(p.created_at)}">⏱ ${tempoDecorrido(p.created_at)}</div>
    <div>${(p.items_json||[]).map(i=>i.title+" x"+i.quantity).join("<br>")}</div>
    <div><b>Obs:</b> ${p.obs||"-"}</div>
    <button class="btn" onclick="editarObs('${p.id}','${p.obs||""}')">Obs</button>
    ${btn}
  `;

  return div;
}

// ================= RENDER =================
function renderizar(){
  const paid = pedidos.filter(p=>p.payment_status==="approved" && (p.delivery_status==="pending"||!p.delivery_status));
  const prep = pedidos.filter(p=>p.delivery_status==="preparing");
  const ready = pedidos.filter(p=>p.delivery_status==="ready");
  const del = pedidos.filter(p=>p.delivery_status==="out_for_delivery");

  render("col-paid",paid);
  render("col-preparing",prep);
  render("col-ready",ready);
  render("col-delivery",del);
}

function render(id,list){
  const el=document.getElementById(id);
  el.innerHTML="";
  list.forEach(p=>el.appendChild(card(p)));
}

// init
carregarPedidos();
setInterval(carregarPedidos,30000);

</script>

</body>
</html>
