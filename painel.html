<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Painel Operacional - Tá na Mão!</title>

<style>
:root {
  --verde:#3C6E47; --dourado:#C9A86A;
  --fundo:#f4f6f4;
}

body{font-family:Arial;background:var(--fundo);margin:0}

/* LOGIN */
.login {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login input{
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-bottom:10px;
}

.login button{
  padding:12px;
  border:none;
  border-radius:8px;
  background:var(--verde);
  color:#fff;
  font-weight:bold;
}

/* PAINEL */
header{
  background:var(--verde);
  color:#fff;
  padding:20px;
  text-align:center;
}

.board{
  max-width:1400px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  padding:0 16px
}

.column{
  background:#fff;
  border-radius:16px;
  padding:10px;
}

.column-header{
  text-align:center;
  font-weight:800;
  padding:10px;
  border-bottom:1px solid #eee;
}

.card{
  border:1px solid #eee;
  border-radius:10px;
  padding:10px;
  margin-bottom:10px
}

.btn{
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer
}

.topbar{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:10px
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <img src="TanaMao_Logo.jpg" style="height:80px;border-radius:20px;margin-bottom:20px;">
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="painel" style="display:none;">

<header style="display:flex;align-items:center;justify-content:center;gap:12px;">
  <img src="TanaMao_Logo.jpg" style="height:40px;width:40px;border-radius:12px;">
  <h2>Painel Operacional</h2>
</header>

<div class="topbar">
<button class="btn" onclick="carregarPedidos()">Atualizar</button>
<button class="btn" onclick="editarLimite()">Definir limite</button>
<button class="btn" onclick="abrirCardapio()">Editar Cardápio</button>
</div>

<div class="board">
<div class="column"><div class="column-header">Entrou</div><div id="col-paid"></div></div>
<div class="column"><div class="column-header">Produção</div><div id="col-preparing"></div></div>
<div class="column"><div class="column-header">Pronto</div><div id="col-ready"></div></div>
<div class="column"><div class="column-header">Entrega</div><div id="col-delivery"></div></div>
</div>

</div>

<script>

const API = "https://tanamao-backend.onrender.com/api";

let pedidos = [];
let LIMITE = 100;

// ================= LOGIN =================
async function login(){
  const senha = document.getElementById("senha").value;

  const res = await fetch(API + "/login",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({senha})
  });

  const data = await res.json();

  if(!data.ok){
    alert("Senha incorreta");
    return;
  }

  document.getElementById("login").style.display="none";
  document.getElementById("painel").style.display="block";

  carregarPedidos();
}

// ================= PEDIDOS =================
async function carregarPedidos(){
  const res = await fetch(API + "/orders");
  const data = await res.json();
  pedidos = data.orders || [];
  renderizar();
}

// ================= FUNÇÕES =================
function editarLimite(){
  const novo = prompt("Novo limite:", LIMITE);
  if(novo) LIMITE = Number(novo);
}

function abrirCardapio(){
  window.location.href = "https://tanamaofit.com.br/cardapio.html";
}

function atualizar(id,status){
  fetch(API+"/orders/"+id+"/status",{
    method:"PATCH",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({delivery_status:status})
  }).then(()=>carregarPedidos());
}

// ================= CARD =================
function card(p){
  const div=document.createElement("div");
  div.className="card";

  let btn="";

  if(p.delivery_status==="pending")
    btn=`<button class="btn" onclick="atualizar('${p.id}','preparing')">Produção</button>`;
  else if(p.delivery_status==="preparing")
    btn=`<button class="btn" onclick="atualizar('${p.id}','ready')">Pronto</button>`;
  else if(p.delivery_status==="ready")
    btn=`<button class="btn" onclick="atualizar('${p.id}','out_for_delivery')">Entrega</button>`;

  div.innerHTML=`
    <b>${p.customer_name}</b><br>
    ${p.items_json.map(i=>i.title+" x"+i.quantity).join("<br>")}
    ${btn}
  `;

  return div;
}

// ================= RENDER =================
function renderizar(){
  render("col-paid", pedidos.filter(p=>p.delivery_status==="pending"||!p.delivery_status));
  render("col-preparing", pedidos.filter(p=>p.delivery_status==="preparing"));
  render("col-ready", pedidos.filter(p=>p.delivery_status==="ready"));
  render("col-delivery", pedidos.filter(p=>p.delivery_status==="out_for_delivery"));
}

function render(id,list){
  const el=document.getElementById(id);
  el.innerHTML="";
  list.forEach(p=>el.appendChild(card(p)));
}

</script>

</body>
</html>
