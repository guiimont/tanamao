<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Operacional</title>

<style>
:root{
--verde:#3C6E47;
--dourado:#C9A86A;
--fundo:#f4f6f4;
}

body{font-family:Arial;background:var(--fundo);margin:0}

header{
background:var(--verde);
color:#fff;
padding:16px;
text-align:center;
}

.topbar{
display:flex;
gap:10px;
padding:16px;
justify-content:center;
}

.btn{
background:var(--dourado);
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.board{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
padding:16px;
}

.column{
background:#fff;
border-radius:12px;
padding:10px;
min-height:400px;
}

.column-header{
font-weight:bold;
margin-bottom:10px;
color:var(--verde);
}

.card{
background:#f9f9f9;
padding:10px;
border-radius:8px;
margin-bottom:8px;
font-size:14px;
}

.card button{
margin-top:6px;
width:100%;
}
</style>
</head>

<body>

<header>
<h2>Painel Operacional</h2>
</header>

<div class="topbar">
<button class="btn" onclick="carregarPedidos()">Atualizar</button>
<button class="btn" onclick="editarLimite()">Definir limite</button>
<button class="btn" onclick="abrirCardapio()">Editar Cardápio</button>
</div>

<div class="board">
<div class="column">
<div class="column-header">Entrou</div>
<div id="col-paid"></div>
</div>

<div class="column">
<div class="column-header">Produção</div>
<div id="col-preparing"></div>
</div>

<div class="column">
<div class="column-header">Pronto</div>
<div id="col-ready"></div>
</div>

<div class="column">
<div class="column-header">Entrega</div>
<div id="col-delivery"></div>
</div>
</div>

<script>

const API = "https://tanamao-backend.onrender.com/api";

let pedidos = [];
let LIMITE = 100;

// ================= PEDIDOS =================
async function carregarPedidos(){
const res = await fetch(API + "/orders");
const data = await res.json();
pedidos = data.orders || [];
renderizar();
}

// ================= RENDER =================
function renderizar(){
renderCol("col-paid", pedidos.filter(p => p.payment_status==="approved" && (p.delivery_status==="pending" || !p.delivery_status)));
renderCol("col-preparing", pedidos.filter(p => p.delivery_status==="preparing"));
renderCol("col-ready", pedidos.filter(p => p.delivery_status==="ready"));
renderCol("col-delivery", pedidos.filter(p => p.delivery_status==="out_for_delivery"));
}

function renderCol(id, lista){
const el = document.getElementById(id);
el.innerHTML = "";

if(!lista.length){
el.innerHTML = "<div class='card'>Vazio</div>";
return;
}

lista.forEach(p=>{
el.innerHTML += `
<div class="card">
<strong>${p.customer_name || "Cliente"}</strong><br>
Total: R$ ${Number(p.total||0).toFixed(2)}<br>

    ${botao(p)}
  </div>
`;

});
}

// ================= BOTÕES =================
function botao(p){
  if(p.delivery_status==="pending"){
    return `<button onclick="atualizar('${p.id}','preparing')">Produção</button>`;
  }
  if(p.delivery_status==="preparing"){
    return `<button onclick="atualizar('${p.id}','ready')">Pronto</button>`;
  }
  if(p.delivery_status==="ready"){
    return `<button onclick="atualizar('${p.id}','out_for_delivery')">Entrega</button>`;
  }
  if(p.delivery_status==="out_for_delivery"){
    return `<button onclick="atualizar('${p.id}','delivered')">Finalizar</button>`;
  }
  return "";
}

// ================= UPDATE =================
async function atualizar(id,status){
await fetch(API+"/operations/orders/"+id+"/status",{
method:"PATCH",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({delivery_status:status})
});

carregarPedidos();
}

// ================= EXTRA =================
function editarLimite(){
const novo = prompt("Novo limite:", LIMITE);
if(novo) LIMITE = Number(novo);
}

function abrirCardapio(){
window.location.href = "/cardapio.html";
}

// AUTO REFRESH
setInterval(carregarPedidos,30000);

carregarPedidos();

</script>

</body>
</html>
:::
