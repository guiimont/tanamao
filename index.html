<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tá na Mão! — Praticidade e Saúde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #3C6E47;
    --verde-escuro: #2D5235;
    --dourado: #C9A86A;
    --fundo: #f4f6f4;
    --texto: #1a1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Outfit", sans-serif; background: var(--fundo); color: var(--texto); }

  #auth-bar {
    background: #111; color: var(--dourado);
    text-align: center; padding: 9px 16px;
    font-size: 0.85em; font-weight: 600; display: none;
  }
  #auth-bar a { color: #fff; cursor: pointer; text-decoration: underline; margin-left: 10px; font-weight: 400; }

  header {
    background: var(--verde);
    padding: 40px 20px 32px;
    text-align: center;
    border-bottom: 4px solid var(--dourado);
  }
  header img.logo {
    width: 130px; height: 130px; border-radius: 28px;
    display: block; margin: 0 auto 18px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  header h1 { font-size: 2.4em; font-weight: 800; color: var(--dourado); }
  header .slogan { font-size: 1.05em; font-weight: 600; color: #fff; margin-bottom: 12px; }

  .badge { color: var(--dourado); }
</style>
</head>
<body>

<div id="auth-bar"></div>

<header>
  <img src="TanaMao_Logo.jpg" class="logo" alt="Tá na Mão!">
  <div class="slogan">Praticidade & Saúde</div>
  <p>Pratos prontos e congelados com sabor caseiro para resolver sua semana sem complicações.</p>
  <div>
    <span class="badge">✔ Sem conservantes</span>
    <span class="badge">✔ Produção caseira</span>
    <span class="badge">✔ Entrega em 48h</span>
  </div>
</header>

<script>
const BACKEND_URL = "https://tanamao-backend.onrender.com";
let clienteAtual = JSON.parse(localStorage.getItem("tanamao_cliente")) || null;

function checarLogin() {
  const bar = document.getElementById("auth-bar");
  if (clienteAtual) {
    bar.innerHTML = `Olá de novo, <strong>${clienteAtual.nome.split(" ")[0]}</strong>! ✨ <a onclick="limparCadastro()">Sair</a>`;
    bar.style.display = "block";
  } else {
    bar.style.display = "none";
  }
}

function limparCadastro() {
  localStorage.removeItem("tanamao_cliente");
  clienteAtual = null;
  checarLogin();
}

function fmt(v) {
  return "R$ " + Number(v).toFixed(2).replace(".", ",");
}

function textoSeguro(str) {
  return String(str || "").replace(/[<>]/g, "");
}

checarLogin();
</script>

<footer>Tá na Mão! &copy; 2025 · Alimentação Inteligente.</footer>

</body>
</html>
