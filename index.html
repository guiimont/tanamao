<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tá na Mão! — Praticidade e Saúde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #3C6E47;
    --verde-escuro: #2D5235;
    --dourado: #C9A86A;
    --fundo: #f4f6f4;
    --texto: #1a1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Outfit", sans-serif; background: var(--fundo); color: var(--texto); }

  #auth-bar { background: #111; color: var(--dourado); text-align: center; padding: 9px; display:none; }
  #auth-bar a { color:#fff; margin-left:10px; cursor:pointer; }

  .container { max-width:800px; margin:auto; padding:20px; }
  .product { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee; }
  .qty-wrap button { width:30px; height:30px; }

  .btn { background:var(--dourado); padding:12px; border:none; border-radius:8px; cursor:pointer; width:100%; }
</style>
</head>
<body>

<div id="auth-bar"></div>

<div class="container">
  <h1>Tá na Mão! — Praticidade e Saúde</h1>
  <div id="produtos"></div>
  <h2 id="total"></h2>
  <button class="btn" onclick="checkout()">Finalizar Pedido →</button>
</div>

<script>
const BACKEND_URL = "https://tanamao-backend.onrender.com";
let produtos = [];
let carrinho = {};
let clienteAtual = JSON.parse(localStorage.getItem("tanamao_cliente")) || null;

function checarLogin() {
  const bar = document.getElementById("auth-bar");
  if(clienteAtual){
    bar.innerHTML = `Olá, ${clienteAtual.nome.split(" ")[0]} ✨ <a onclick="logout()">Sair</a>`;
    bar.style.display = "block";
  }
}

function logout(){
  localStorage.removeItem("tanamao_cliente");
  location.reload();
}

async function carregar(){
  const res = await fetch(BACKEND_URL+"/api/products");
  const data = await res.json();
  produtos = data.products || [];
  render();
}

function render(){
  const el = document.getElementById("produtos");
  el.innerHTML = produtos.map(p=>`
    <div class="product">
      <div>
        <strong>${p.name}</strong><br>
        R$ ${Number(p.price).toFixed(2).replace(".",",")}
      </div>
      <div class="qty-wrap">
        <button onclick="add('${p.id}',-1)">−</button>
        <span>${carrinho[p.id]||0}</span>
        <button onclick="add('${p.id}',1)">+</button>
      </div>
    </div>
  `).join("");
  atualizarTotal();
}

function add(id, q){
  carrinho[id] = Math.max(0,(carrinho[id]||0)+q);
  render();
}

function atualizarTotal(){
  let total=0;
  produtos.forEach(p=>{
    total += (carrinho[p.id]||0)*Number(p.price);
  });
  document.getElementById("total").innerText = "Total: R$ "+total.toFixed(2).replace(".",",");
}

async function checkout(){
  const items = Object.keys(carrinho).filter(id=>carrinho[id]>0).map(id=>({id,quantity:carrinho[id]}));
  if(!items.length){ alert("Selecione itens"); return; }

  const res = await fetch(BACKEND_URL+"/api/checkout/create-preference",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({items})
  });

  const data = await res.json();
  if(data.checkoutUrl) window.location.href = data.checkoutUrl;
}

checarLogin();
carregar();
</script>

</body>
</html>
