<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Tá na Mão!</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .login-box { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
    .login-box h2 { text-align: center; color: #333; margin-bottom: 20px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #27ae60; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; }
    button:disabled { background: #95a5a6; cursor: not-allowed; }
    .erro { color: #e74c3c; font-size: 14px; text-align: center; display: none; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
<section class="hero">
<img
src="https://storage.googleapis.com/app-tess-ai-platform-assets-prod/assets/uplo
ads/5681b1bf-2661-4360-9c01-6141cd6ff531.png"
alt="Ícone Tá na Mão!"
style="width:80px;height:80px;object-fit:contain;display:block;margin:0 auto
14px;"
>
<div class="tag">• Alimentação Inteligente •</div>
  <div class="login-box">
    <h2>Acesso ao Sistema</h2>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Seu E-mail" required>
      <input type="password" id="senha" placeholder="Sua Senha" required>
      <button type="submit" id="btn-login">Entrar</button>
      <div id="erroMsg" class="erro"></div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const erroEl = document.getElementById('erroMsg');
      
      btn.disabled = true;
      btn.innerText = "Autenticando...";
      erroEl.style.display = "none";

      try {
        const res = await fetch('https://tanamao-backend.onrender.com/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('senha').value
          })
        });
        
        const data = await res.json();
        if (data.ok) {
          localStorage.setItem('tnm_token', data.token);
          localStorage.setItem('tnm_user', JSON.stringify(data.user));
          window.location.href = 'painel.html';
        } else {
          throw new Error(data.message || "Credenciais inválidas");
        }
      } catch (err) {
        erroEl.innerText = err.message;
        erroEl.style.display = "block";
        btn.disabled = false;
        btn.innerText = "Entrar";
      }
    });
  </script>
</body>
</html>
